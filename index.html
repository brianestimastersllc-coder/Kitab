<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Kharcha — Expense Tracker</title>
<meta name="theme-color" content="#0e1613">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kharcha">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#0e1613; --card:#17211d; --card2:#1d2a25; --line:#26352f;
  --txt:#eaf2ee; --dim:#8fa69c; --green:#34d399; --red:#f87171; --amber:#fbbf24;
  --accent:#10b981; --accent-dk:#0b8a61;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size:16px;}
body{padding-bottom:calc(74px + env(safe-area-inset-bottom));}
header{position:sticky; top:0; z-index:20; background:rgba(14,22,19,.92); backdrop-filter:blur(12px);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px; border-bottom:1px solid var(--line);}
.hrow{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.mnav{display:flex; align-items:center; gap:4px; font-weight:700; font-size:17px;}
.mnav button{background:none; border:none; color:var(--accent); font-size:22px; padding:2px 10px; cursor:pointer;}
.ratechip{background:var(--card2); border:1px solid var(--line); color:var(--dim); border-radius:999px;
  padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;}
.ratechip b{color:var(--txt);}
main{padding:14px 16px 20px; max-width:560px; margin:0 auto;}
.cards{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:12px 10px;}
.card .lbl{font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px;}
.card .val{font-size:16px; font-weight:800; line-height:1.2; word-break:break-word;}
.card .sub{font-size:11px; color:var(--dim); margin-top:3px;}
.pos{color:var(--green);} .neg{color:var(--red);} .amb{color:var(--amber);}
h2{font-size:13px; color:var(--dim); text-transform:uppercase; letter-spacing:.8px; margin:20px 0 10px; font-weight:700;}
.panel{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:14px;}
.seg{display:flex; background:var(--card2); border-radius:12px; padding:3px; margin-bottom:12px;}
.seg button{flex:1; border:none; background:none; color:var(--dim); font-weight:700; font-size:14px;
  padding:9px 4px; border-radius:10px; cursor:pointer;}
.seg button.on{background:var(--accent); color:#04120c;}
.amtrow{display:flex; gap:8px; margin-bottom:12px;}
.amtrow input{flex:1; background:var(--card2); border:1px solid var(--line); color:var(--txt);
  border-radius:14px; padding:14px; font-size:26px; font-weight:800; width:100%; min-width:0;}
.curbtn{background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:14px;
  padding:0 18px; font-size:20px; font-weight:800; cursor:pointer; min-width:74px;}
.curbtn.usd{color:var(--amber);}
.chips{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;}
.chip{background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:999px;
  padding:9px 13px; font-size:14px; font-weight:600; cursor:pointer;}
.chip.on{background:var(--accent); border-color:var(--accent); color:#04120c;}
.frow{display:flex; gap:8px; margin-bottom:12px;}
.frow input,.frow select{flex:1; background:var(--card2); border:1px solid var(--line); color:var(--txt);
  border-radius:12px; padding:12px; font-size:15px; min-width:0;}
input[type=date]{-webkit-appearance:none; appearance:none;}
.preview{background:var(--card2); border-radius:12px; padding:10px 12px; font-size:13px; color:var(--dim);
  margin-bottom:12px; line-height:1.6;}
.preview b{color:var(--txt);}
.bigbtn{width:100%; background:var(--accent); color:#04120c; border:none; border-radius:14px;
  padding:15px; font-size:17px; font-weight:800; cursor:pointer;}
.bigbtn:active{background:var(--accent-dk);}
.bigbtn.ghost{background:var(--card2); color:var(--txt); border:1px solid var(--line);}
.bigbtn.danger{background:#3a1d1d; color:var(--red); border:1px solid #5a2a2a;}
.item{display:flex; align-items:center; gap:12px; padding:12px 2px; border-bottom:1px solid var(--line); cursor:pointer;}
.item:last-child{border-bottom:none;}
.item .ico{width:40px; height:40px; border-radius:12px; background:var(--card2); display:flex;
  align-items:center; justify-content:center; font-size:19px; flex-shrink:0;}
.item .mid{flex:1; min-width:0;}
.item .t1{font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.item .t2{font-size:12px; color:var(--dim); margin-top:2px;}
.item .amt{text-align:right; font-weight:800; font-size:15px; white-space:nowrap;}
.item .amt .orig{display:block; font-size:11px; color:var(--dim); font-weight:600;}
.dayhead{font-size:12px; color:var(--dim); font-weight:700; margin:14px 2px 2px;}
.duebtn{background:var(--accent); color:#04120c; border:none; border-radius:10px; padding:8px 14px;
  font-weight:800; font-size:13px; cursor:pointer; flex-shrink:0;}
.pill{font-size:11px; background:var(--card2); border-radius:999px; padding:3px 9px; color:var(--dim); font-weight:700;}
.pill.paid{color:var(--green);}
.pill.over{color:var(--red);}
.bar{height:7px; background:var(--card2); border-radius:99px; overflow:hidden; margin-top:6px;}
.bar i{display:block; height:100%; background:var(--accent); border-radius:99px;}
.empty{text-align:center; color:var(--dim); padding:26px 10px; font-size:14px;}
nav{position:fixed; bottom:0; left:0; right:0; z-index:30; display:flex; background:rgba(14,22,19,.95);
  backdrop-filter:blur(12px); border-top:1px solid var(--line); padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
nav button{flex:1; background:none; border:none; color:var(--dim); font-size:9px; font-weight:700;
  display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; cursor:pointer;}
nav button .nico{font-size:21px; line-height:1;}
nav button.on{color:var(--accent);}
.overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:40; display:none; align-items:flex-end; justify-content:center;}
.overlay.show{display:flex;}
.sheet{background:var(--card); border-radius:22px 22px 0 0; width:100%; max-width:560px; max-height:86vh;
  overflow-y:auto; padding:18px 18px calc(20px + env(safe-area-inset-bottom));}
.sheet h3{margin:0 0 16px; font-size:18px;}
.sheet .grab{width:40px; height:4px; background:var(--line); border-radius:99px; margin:0 auto 14px;}
.setrow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 2px; border-bottom:1px solid var(--line);}
.setrow:last-child{border-bottom:none;}
.setrow .sl{font-size:15px; font-weight:600;}
.setrow .sd{font-size:12px; color:var(--dim); margin-top:2px;}
.setrow input,.setrow select{background:var(--card2); border:1px solid var(--line); color:var(--txt);
  border-radius:10px; padding:9px 11px; font-size:15px; width:110px; text-align:right;}
.smallbtn{background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:10px;
  padding:8px 14px; font-weight:700; font-size:13px; cursor:pointer;}
.hint{background:linear-gradient(135deg,#123a2c,#0e2b21); border:1px solid #1d5c44; border-radius:16px;
  padding:14px; font-size:14px; line-height:1.6; margin-bottom:14px; position:relative;}
.hint .x{position:absolute; top:8px; right:12px; background:none; border:none; color:var(--dim); font-size:18px; cursor:pointer;}
.alert{background:linear-gradient(135deg,#3a1d1d,#2a1414); border:1px solid #5a2a2a; border-radius:16px;
  padding:12px 14px; font-size:14px; line-height:1.6; margin-bottom:14px; color:#ffd9d9;}
.toast{position:fixed; left:16px; right:16px; bottom:calc(84px + env(safe-area-inset-bottom)); z-index:60;
  max-width:528px; margin:0 auto; background:var(--card2); border:1px solid var(--line); color:var(--txt);
  border-radius:14px; padding:12px 14px; font-size:14px; font-weight:600; text-align:center;
  opacity:0; transform:translateY(8px); transition:opacity .25s, transform .25s; pointer-events:none;}
.toast.show{opacity:1; transform:none;}
.toast.danger{background:#3a1d1d; border-color:#5a2a2a; color:#ffd9d9;}
.mt8{margin-top:8px;} .mt12{margin-top:12px;}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="mnav">
      <button data-act="mprev">‹</button>
      <span id="mlabel"></span>
      <button data-act="mnext">›</button>
    </div>
    <button class="ratechip" data-act="raterefresh" id="ratechip"></button>
  </div>
</header>
<main id="main"></main>
<nav id="nav">
  <button data-tab="home"><span class="nico">🏠</span>Home</button>
  <button data-tab="hist"><span class="nico">🧾</span>History</button>
  <button data-tab="rec"><span class="nico">🔁</span>Bills</button>
  <button data-tab="team"><span class="nico">👥</span>Team</button>
  <button data-tab="loan"><span class="nico">🤝</span>Loans</button>
  <button data-tab="wealth"><span class="nico">💰</span>Wealth</button>
  <button data-tab="trends"><span class="nico">📈</span>Trends</button>
  <button data-tab="set"><span class="nico">⚙️</span>Settings</button>
</nav>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div id="lock" style="display:none; position:fixed; inset:0; z-index:100; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:14px;">
  <div style="font-size:46px">🔒</div>
  <div style="color:var(--dim); font-weight:600">Enter your PIN</div>
  <input id="pin" type="password" inputmode="numeric" maxlength="4" autocomplete="off"
    style="background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:14px; padding:14px; font-size:28px; width:140px; text-align:center; letter-spacing:10px">
  <div id="pinerr" style="color:var(--red); font-size:13px; height:18px"></div>
</div>

<script>
'use strict';
/* ================= data ================= */
const KEY='kharcha-data-v1';
const APPVER='v6';
const CATS=[
  {id:'fuel',    n:'Fuel',            i:'⛽'},
  {id:'grocery', n:'Groceries',       i:'🛒'},
  {id:'daily',   n:'Daily Groceries', i:'🥬'},
  {id:'meals',   n:'Meal Charges',    i:'🍽️'},
  {id:'parking', n:'Car Parking',     i:'🅿️'},
  {id:'rent',    n:'Room Rent',       i:'🏠'},
  {id:'subs',    n:'Subscription',    i:'📱'},
  {id:'car',     n:'Car Maintenance', i:'🔧'},
  {id:'services',n:'Services',        i:'🧾'},
  {id:'misc',    n:'Misc',            i:'📦'},
];
const catById=id=>CATS.find(c=>c.id===id)||CATS[CATS.length-1];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const curYM=()=>todayStr().slice(0,7);

function seedAccounts(){
  const mk=(name,cur,kind)=>({id:uid(),name,cur,kind,base:0,updated:''});
  return [
    mk('UBL','PKR','bank'), mk('NBP','PKR','bank'),
    mk('JazzCash','PKR','wallet'), mk('EasyPaisa','PKR','wallet'),
    mk('PayPal','USD','intl'), mk('Payoneer','USD','intl'), mk('Wise','USD','intl'),
    mk('Fiverr','USD','platform'), mk('Upwork','USD','platform'),
    mk('Cash','PKR','cash')
  ];
}
function seedBudgets(){ return {total:0, cats:{}}; }
function seed(){
  return {
    v:1,
    settings:{taxPreset:'pseb', taxPct:0.25, manualRate:null, rate:{v:283, ts:0}, hideHint:false},
    employees:[],
    loans:[],
    accounts:seedAccounts(),
    snapshots:[],
    budgets:seedBudgets(),
    recurring:[
      {id:uid(), name:'Room Rent',        cat:'rent',    amount:0,     cur:'PKR', period:'monthly'},
      {id:uid(), name:'Meal Charges',     cat:'meals',   amount:0,     cur:'PKR', period:'monthly'},
      {id:uid(), name:'Car Parking',      cat:'parking', amount:0,     cur:'PKR', period:'monthly'},
      {id:uid(), name:'KAM',              cat:'subs',    amount:0,     cur:'USD', period:'monthly'},
      {id:uid(), name:'ZAR',              cat:'subs',    amount:0,     cur:'USD', period:'monthly'},
      {id:uid(), name:'Apple',            cat:'subs',    amount:0,     cur:'USD', period:'monthly'},
      {id:uid(), name:'Claude',           cat:'subs',    amount:0,     cur:'USD', period:'monthly'},
      {id:uid(), name:'Meta',             cat:'subs',    amount:0,     cur:'USD', period:'monthly'},
      {id:uid(), name:'Tax Return Filing',cat:'services',amount:0,     cur:'PKR', period:'yearly', month:9},
    ],
    txns:[]
  };
}
function load(){
  try{const j=JSON.parse(localStorage.getItem(KEY)); if(j&&j.txns){
    if(!j.loans)j.loans=[];
    if(!j.accounts)j.accounts=seedAccounts();
    if(!j.snapshots)j.snapshots=[];
    if(!j.budgets)j.budgets=seedBudgets();
    // One-time: the first seed used placeholder names for the $ accounts.
    // Only renames if the placeholder is untouched and the real name isn't taken.
    if(!j.settings.mig1){
      const taken=n=>j.accounts.some(a=>(a.name||'').toLowerCase()===n.toLowerCase());
      [['Pay','PayPal'],['Pay B','Payoneer']].forEach(([from,to])=>{
        const a=j.accounts.find(x=>x.name===from);
        if(a&&!taken(to)) a.name=to;
      });
      j.settings.mig1=true;
    }
    return j;
  }}catch(e){}
  return seed();
}
let S=load();
const save=()=>localStorage.setItem(KEY,JSON.stringify(S));

/* ================= fx rate ================= */
const rate=()=>S.settings.manualRate||S.settings.rate.v||283;
async function refreshRate(force){
  const r=S.settings.rate;
  if(!force && r.ts && (Date.now()-r.ts)<12*3600*1000) return;
  const chip=document.getElementById('ratechip');
  if(chip) chip.textContent='updating…';
  try{
    const res=await fetch('https://open.er-api.com/v6/latest/USD',{cache:'no-store'});
    const j=await res.json();
    if(j&&j.rates&&j.rates.PKR){S.settings.rate={v:j.rates.PKR, ts:Date.now()}; save();}
  }catch(e){/* offline — keep cached rate */}
  render();
}

/* ================= helpers ================= */
const nf=new Intl.NumberFormat('en-PK',{maximumFractionDigits:0});
const fmt=n=>'Rs '+nf.format(Math.round(n));
const fmtUSD=n=>'$'+(Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
const pkrOf=t=>t.cur==='PKR'?t.amt:t.amt*(t.rate||rate());
const incNet=t=>{const g=pkrOf(t); return g-(g*(t.taxPct||0)/100);};
const incTax=t=>pkrOf(t)*(t.taxPct||0)/100;
const monthTxns=ymv=>S.txns.filter(t=>t.date.slice(0,7)===ymv);
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const ymLabel=ymv=>{const[y,m]=ymv.split('-');return MONTHS[+m-1]+' '+y;};
const fyOf=d=>{const y=+d.slice(0,4),m=+d.slice(5,7);return m>=7?y:y-1;};// PK fiscal year Jul–Jun
const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ================= view state ================= */
let view={tab:'home', ym:curYM(), kind:'exp', cur:'PKR', cat:'fuel', empId:null, unmask:false, xfrom:'', xto:'', trendSel:''};

/* ================= accounts ================= */
const accById=id=>S.accounts.find(a=>a.id===id);
const KINDS=[['bank','🏦 Bank (PKR, income lands here)'],['wallet','📱 Wallet'],['intl','🌍 International'],['platform','💼 Platform'],['cash','💵 Cash']];
const kindIcon=k=>({bank:'🏦',wallet:'📱',intl:'🌍',platform:'💼',cash:'💵'}[k]||'🏦');
function accBalance(a){
  let b=a.base||0;
  S.txns.forEach(t=>{
    if(t.kind==='xfer'){
      if(t.from===a.id) b-=t.amtOut;
      if(t.to===a.id) b+=t.amtIn;
    }else if(t.kind==='inc'){
      if(t.dstId===a.id){
        const g=pkrOf(t), net=g-(g*(t.taxPct||0)/100);
        b+=(a.cur==='PKR')?net:net/(t.rate||rate());
      }
    }else if(t.srcId===a.id){
      if(t.cur===a.cur) b-=t.amt;
      else if(a.cur==='PKR') b-=t.amt*(t.rate||rate());
      else b-=t.amt/(t.rate||rate());
    }
  });
  return b;
}
const accPKR=a=>a.cur==='USD'?accBalance(a)*rate():accBalance(a);
// Where freelance $ can land: PK banks, international ($ services) and platforms.
const canDeposit=a=>a.kind==='bank'||a.kind==='intl'||a.kind==='platform';
const acctOpts=(sel,filter)=>S.accounts.filter(filter||(()=>true))
  .map(a=>'<option value="'+a.id+'" '+(sel===a.id?'selected':'')+'>'+kindIcon(a.kind)+' '+esc(a.name)+' ('+a.cur+')</option>').join('');

/* ================= render ================= */
function render(){
  document.getElementById('mlabel').textContent=ymLabel(view.ym);
  const rc=document.getElementById('ratechip');
  const manual=!!S.settings.manualRate;
  rc.innerHTML='$1 = <b>Rs '+(Math.round(rate()*100)/100)+'</b> '+(manual?'✎':'⟳');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===view.tab));
  const m=document.getElementById('main');
  if(view.tab==='home') m.innerHTML=homeHTML();
  else if(view.tab==='hist') m.innerHTML=histHTML();
  else if(view.tab==='rec') m.innerHTML=recHTML();
  else if(view.tab==='team') m.innerHTML=teamHTML();
  else if(view.tab==='loan') m.innerHTML=loansHTML();
  else if(view.tab==='wealth') m.innerHTML=wealthHTML();
  else if(view.tab==='trends') m.innerHTML=trendsHTML();
  else m.innerHTML=setHTML();
}

function sums(ymv){
  const ts=monthTxns(ymv);
  let inc=0,tax=0,exp=0,pay=0;
  ts.forEach(t=>{
    if(t.kind==='inc'){inc+=incNet(t); tax+=incTax(t);}
    else if(t.kind==='pay'){pay+=pkrOf(t);}
    else if(t.kind!=='xfer') exp+=pkrOf(t);
  });
  return {inc,tax,exp,pay,ts};
}

function homeHTML(){
  const {inc,tax,exp,pay}=sums(view.ym);
  const bal=inc-exp-pay;
  const isIOS=/iP(hone|ad|od)/.test(navigator.userAgent);
  const standalone=window.navigator.standalone===true||matchMedia('(display-mode: standalone)').matches;
  let h='';
  if(isIOS&&!standalone&&!S.settings.hideHint){
    h+='<div class="hint"><button class="x" data-act="hidehint">✕</button>📲 <b>Install on your iPhone:</b> tap the <b>Share</b> button in Safari, then <b>Add to Home Screen</b>. It becomes a full app that works offline and keeps your data forever.</div>';
  }
  h+='<div class="cards">'
    +'<div class="card"><div class="lbl">Income (net)</div><div class="val pos">'+fmt(inc)+'</div><div class="sub">tax: '+fmt(tax)+'</div></div>'
    +'<div class="card"><div class="lbl">Expenses</div><div class="val neg">'+fmt(exp+pay)+'</div><div class="sub">team: '+fmt(pay)+'</div></div>'
    +'<div class="card"><div class="lbl">Balance</div><div class="val '+(bal>=0?'pos':'neg')+'">'+fmt(bal)+'</div><div class="sub">FY tax: '+fmt(fyTax())+'</div></div>'
    +'</div>';

  const over=overList(view.ym);
  if(over.length){
    h+='<div class="alert">⚠️ <b>Over budget this month</b><br>'
      +over.map(o=>esc(o.name)+' by <b>'+fmt(o.by)+'</b>').join(' · ')+'</div>';
  }

  /* quick add */
  const srcSel='<div class="frow"><select id="qsrc"><option value="">💳 Paid from — no account</option>'+acctOpts(S.settings.lastSrc)+'</select></div>';
  h+='<h2>Quick add</h2><div class="panel">'
    +'<div class="seg">'
    +'<button data-kind="exp" class="'+(view.kind==='exp'?'on':'')+'">Expense</button>'
    +'<button data-kind="inc" class="'+(view.kind==='inc'?'on':'')+'">Income</button>'
    +'<button data-kind="pay" class="'+(view.kind==='pay'?'on':'')+'">Team</button>'
    +'<button data-kind="xfer" class="'+(view.kind==='xfer'?'on':'')+'">Transfer</button>'
    +'</div>';
  if(view.kind==='xfer'){
    const f=accById(view.xfrom), t2=accById(view.xto);
    h+='<div class="frow"><select id="qfrom"><option value="">From account…</option>'+acctOpts(view.xfrom)+'</select>'
      +'<select id="qto"><option value="">To account…</option>'+acctOpts(view.xto)+'</select></div>'
      +'<div class="amtrow"><input id="qamt" type="number" inputmode="decimal" placeholder="Amount sent" step="any">'
      +'<span class="curbtn" id="qfromcur" style="display:flex;align-items:center;justify-content:center;font-size:15px">'+(f?f.cur:'—')+'</span></div>'
      +'<div class="amtrow"><input id="qrecv" type="number" inputmode="decimal" placeholder="Amount received" step="any">'
      +'<span class="curbtn" id="qtocur" style="display:flex;align-items:center;justify-content:center;font-size:15px">'+(t2?t2.cur:'—')+'</span></div>'
      +'<div class="preview">Received auto-fills from the live rate when currencies differ — <b>edit it to what you actually got</b> (your bank\'s rate, minus fees).</div>';
  }else{
    h+='<div class="amtrow"><input id="qamt" type="number" inputmode="decimal" placeholder="0" step="any">'
      +'<button class="curbtn '+(view.cur==='USD'?'usd':'')+'" data-act="curflip">'+(view.cur==='USD'?'$':'Rs')+'</button></div>';
  }
  if(view.kind==='exp'){
    h+='<div class="chips">'+CATS.map(c=>'<span class="chip '+(view.cat===c.id?'on':'')+'" data-cat="'+c.id+'">'+c.i+' '+c.n+'</span>').join('')+'</div>'+srcSel;
  }
  if(view.kind==='inc'){
    const dsel=S.settings.lastDst||'';
    const da=accById(dsel);
    const taxDef=(da&&da.kind!=='bank')?0:S.settings.taxPct;
    h+='<div class="frow"><select id="qdst"><option value="">💵 Landed in — no account</option>'+acctOpts(dsel,canDeposit)+'</select></div>'
      +'<div class="frow">'
      +'<div style="flex:1;min-width:0"><div style="font-size:11px;color:var(--dim);font-weight:700;margin-bottom:4px">YOUR $ RATE</div>'
      +'<input id="qrate" type="number" inputmode="decimal" step="any" value="'+(Math.round(rate()*100)/100)+'" style="width:100%"></div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:11px;color:var(--dim);font-weight:700;margin-bottom:4px">TAX %</div>'
      +'<input id="qtax" type="number" inputmode="decimal" step="any" value="'+taxDef+'" style="width:100%"></div>'
      +'</div>'
      +'<div class="preview" id="incprev">Type an amount. Both boxes are editable — tax auto-drops to 0 when the $ lands in a foreign account (PK tax applies later, when it reaches your bank).</div>';
  }
  if(view.kind==='pay'){
    if(S.employees.length===0){
      h+='<div class="preview">No employees yet — add them in the <b>Team</b> tab first.</div>';
    }else{
      h+='<div class="chips">'+S.employees.map(e=>'<span class="chip '+(view.empId===e.id?'on':'')+'" data-emp="'+e.id+'">👤 '+esc(e.name)+'</span>').join('')+'</div>'+srcSel;
    }
  }
  h+='<div class="frow"><input id="qdate" type="date" value="'+todayStr()+'"><input id="qnote" placeholder="Note (optional)"></div>'
    +'<button class="bigbtn" data-act="qsave">Save</button></div>';

  /* due recurring */
  const due=dueList();
  if(due.length){
    h+='<h2>Due this month</h2><div class="panel">'+due.map(r=>{
      const c=catById(r.cat);
      const amtTxt=r.amount>0?(r.cur==='USD'?fmtUSD(r.amount)+' ≈ '+fmt(r.amount*rate()):fmt(r.amount)):'set amount';
      return '<div class="item" data-recpay="'+r.id+'"><div class="ico">'+c.i+'</div>'
        +'<div class="mid"><div class="t1">'+esc(r.name)+'</div><div class="t2">'+amtTxt+(r.period==='yearly'?' · yearly':'')+'</div></div>'
        +'<button class="duebtn" data-recpay="'+r.id+'">Paid ✓</button></div>';
    }).join('')+'</div>';
  }

  /* loan deadlines */
  const lsoon=S.loans.filter(l=>!l.settled&&l.due&&loanRemaining(l)>0&&l.due<=addDaysStr(7))
    .sort((a,b)=>a.due.localeCompare(b.due));
  if(lsoon.length){
    h+='<h2>Loan deadlines</h2><div class="panel" style="padding:2px 14px">'+lsoon.map(l=>{
      const over=l.due<todayStr(), rem=loanRemaining(l);
      return '<div class="item" data-loan="'+l.id+'"><div class="ico">'+(l.dir==='owe'?'🔻':'🔺')+'</div>'
        +'<div class="mid"><div class="t1">'+esc(l.person)+'</div><div class="t2">'
        +(l.cur==='USD'?fmtUSD(rem):fmt(rem))+' left · due '+l.due+'</div></div>'
        +'<span class="pill '+(over?'over':'')+'">'+(over?'overdue':'due soon')+'</span></div>';
    }).join('')+'</div>';
  }

  /* budget */
  const brows=budgetRows(view.ym);
  if(brows.length||S.budgets.total>0){
    h+='<div class="hrow"><h2>Budget — '+MONTHS[+view.ym.slice(5,7)-1]+'</h2>'
      +'<button class="smallbtn" data-act="budgetedit">Edit</button></div><div class="panel">';
    if(S.budgets.total>0){
      const s=sums(view.ym);
      h+=budgetBar({name:'Total spending', icon:'📊', spent:s.exp+s.pay, budget:S.budgets.total}, brows.length>0);
    }
    brows.forEach(r=>{h+=budgetBar({name:r.cat.n, icon:r.cat.i, spent:r.spent, budget:r.budget});});
    h+='</div>';
  }else{
    h+='<button class="bigbtn ghost mt12" data-act="budgetedit">🎯 Set a monthly budget</button>';
  }

  /* breakdown */
  const ts=monthTxns(view.ym).filter(t=>t.kind==='exp'||t.kind==='pay'||!t.kind);
  if(ts.length){
    const by={};
    ts.forEach(t=>{const k=t.kind==='pay'?'__team':t.cat||'misc'; by[k]=(by[k]||0)+pkrOf(t);});
    const tot=Object.values(by).reduce((a,b)=>a+b,0)||1;
    const rows=Object.entries(by).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
      const c=k==='__team'?{i:'👥',n:'Team Payments'}:catById(k);
      return '<div style="padding:9px 2px"><div style="display:flex;justify-content:space-between;font-size:14px"><span>'+c.i+' '+c.n+'</span><b>'+fmt(v)+'</b></div><div class="bar"><i style="width:'+Math.round(v/tot*100)+'%"></i></div></div>';
    }).join('');
    h+='<h2>Spending breakdown</h2><div class="panel">'+rows+'</div>';
  }
  return h;
}

function fyTax(){
  const fy=fyOf(view.ym+'-01');
  return S.txns.filter(t=>t.kind==='inc'&&fyOf(t.date)===fy).reduce((a,t)=>a+incTax(t),0);
}

function dueList(){
  if(view.ym!==curYM()) return [];
  const ts=monthTxns(view.ym);
  const yr=view.ym.slice(0,4);
  return S.recurring.filter(r=>{
    if(r.period==='yearly'){
      if(+view.ym.slice(5,7)!==(r.month||1)) return false;
      return !S.txns.some(t=>t.recId===r.id&&t.date.slice(0,4)===yr);
    }
    return !ts.some(t=>t.recId===r.id);
  });
}

function txnRow(t){
  let ico,t1;
  if(t.kind==='xfer'){
    const f=accById(t.from), to2=accById(t.to);
    const fCur=f?f.cur:'PKR', tCur=to2?to2.cur:'PKR';
    let t1x=(f?f.name:'(removed)')+' → '+(to2?to2.name:'(removed)');
    if(t.note) t1x+=' · '+t.note;
    return '<div class="item" data-edit="'+t.id+'"><div class="ico">⇄</div>'
      +'<div class="mid"><div class="t1">'+esc(t1x)+'</div><div class="t2">'+t.date+' · transfer</div></div>'
      +'<div class="amt">'+(fCur==='USD'?fmtUSD(t.amtOut):fmt(t.amtOut))
      +'<span class="orig">→ '+(tCur==='USD'?fmtUSD(t.amtIn):fmt(t.amtIn))+'</span></div></div>';
  }
  if(t.kind==='inc'){ico='💵'; t1='Freelance Income';}
  else if(t.kind==='pay'){const e=S.employees.find(e=>e.id===t.empId); ico='👥'; t1='Pay — '+(e?e.name:'employee');}
  else{const c=catById(t.cat); ico=c.i; t1=c.n;}
  if(t.note) t1+=' · '+t.note;
  const sign=t.kind==='inc'?'+':'−';
  const cls=t.kind==='inc'?'pos':'';
  const main=t.kind==='inc'?fmt(incNet(t)):fmt(pkrOf(t));
  let orig='';
  if(t.cur==='USD') orig='<span class="orig">'+fmtUSD(t.amt)+' @ '+(Math.round((t.rate||0)*100)/100)+'</span>';
  else if(t.kind==='inc') orig='<span class="orig">tax '+fmt(incTax(t))+'</span>';
  return '<div class="item" data-edit="'+t.id+'"><div class="ico">'+ico+'</div>'
    +'<div class="mid"><div class="t1">'+esc(t1)+'</div><div class="t2">'+t.date+'</div></div>'
    +'<div class="amt '+cls+'">'+sign+' '+main+orig+'</div></div>';
}

function histHTML(){
  const ts=monthTxns(view.ym).slice().sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  if(!ts.length) return '<div class="empty">No entries in '+ymLabel(view.ym)+' yet.<br>Add your first one from the Home tab 👇</div>';
  let h='',day='';
  ts.forEach(t=>{
    if(t.date!==day){day=t.date; h+='<div class="dayhead">'+day+'</div><div class="panel" style="padding:2px 14px">';}
    h+=txnRow(t);
    const next=ts[ts.indexOf(t)+1];
    if(!next||next.date!==day) h+='</div>';
  });
  const {inc,exp,pay}=sums(view.ym);
  return '<div class="cards" style="grid-template-columns:1fr 1fr"><div class="card"><div class="lbl">In</div><div class="val pos">'+fmt(inc)+'</div></div><div class="card"><div class="lbl">Out</div><div class="val neg">'+fmt(exp+pay)+'</div></div></div>'+h;
}

function recHTML(){
  let h='<h2>Recurring bills & subscriptions</h2><div class="panel" style="padding:2px 14px">';
  h+=S.recurring.map(r=>{
    const c=catById(r.cat);
    const amt=r.amount>0?(r.cur==='USD'?fmtUSD(r.amount)+' ≈ '+fmt(r.amount*rate()):fmt(r.amount)):'tap to set amount';

      +'<span class="pill '+(paid?'paid':'')+'">'+(paid?'paid ✓':'pending')+'</span></div>';

  if(r.period==='yearly') return S.txns.some(t=>t.recId===r.id&&t.date.slice(0,4)===view.ym.slice(0,4));
  return monthTxns(curYM()).some(t=>t.recId===r.id);
}

/* ================= loans ================= */
const addDaysStr=n=>{const d=new Date(Date.now()+n*86400000);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const loanRemaining=l=>l.amt-(l.payments||[]).reduce((a,p)=>a+p.amt,0);
const loanPKR=(v,l)=>l.cur==='USD'?v*rate():v;
const loanAmtTxt=(v,l)=>l.cur==='USD'?fmtUSD(v)+' ≈ '+fmt(v*rate()):fmt(v);

function loanRow(l){
  const rem=loanRemaining(l);
  const paidPct=l.amt>0?Math.max(0,Math.min(100,Math.round((l.amt-rem)/l.amt*100))):0;
  const over=!l.settled&&l.due&&l.due<todayStr()&&rem>0;
  let pill='';
  if(l.settled) pill='<span class="pill paid">settled ✓</span>';
  else if(over) pill='<span class="pill over">overdue</span>';
  return '<div class="item" data-loan="'+l.id+'"><div class="ico">'+(l.dir==='owe'?'🔻':'🔺')+'</div>'
    +'<div class="mid"><div class="t1">'+esc(l.person)+'</div>'
    +'<div class="t2">'+loanAmtTxt(rem,l)+' left of '+(l.cur==='USD'?fmtUSD(l.amt):fmt(l.amt))
    +(l.due?' · due '+l.due:'')+'</div>'
    +'<div class="bar"><i style="width:'+paidPct+'%"></i></div></div>'+pill+'</div>';
}

function loansHTML(){
  const act=S.loans.filter(l=>!l.settled);
  const owe=act.filter(l=>l.dir==='owe'), lent=act.filter(l=>l.dir==='lent');
  const sumP=ls=>ls.reduce((a,l)=>a+loanPKR(loanRemaining(l),l),0);
  const so=sumP(owe), sl=sumP(lent);
  let h='<div class="cards">'
    +'<div class="card"><div class="lbl">You owe</div><div class="val neg">'+fmt(so)+'</div><div class="sub">'+owe.length+' active</div></div>'
    +'<div class="card"><div class="lbl">Owed to you</div><div class="val pos">'+fmt(sl)+'</div><div class="sub">'+lent.length+' active</div></div>'
    +'<div class="card"><div class="lbl">Net</div><div class="val '+(sl-so>=0?'pos':'neg')+'">'+fmt(sl-so)+'</div><div class="sub">position</div></div></div>';
  if(!S.loans.length) h+='<div class="empty">No loans yet.<br>Track anything you owe or lent below 👇</div>';
  if(owe.length) h+='<h2>🔻 I owe</h2><div class="panel" style="padding:2px 14px">'+owe.map(loanRow).join('')+'</div>';
  if(lent.length) h+='<h2>🔺 Owed to me</h2><div class="panel" style="padding:2px 14px">'+lent.map(loanRow).join('')+'</div>';
  const done=S.loans.filter(l=>l.settled);
  if(done.length) h+='<h2>✓ Settled</h2><div class="panel" style="padding:2px 14px">'+done.map(loanRow).join('')+'</div>';
  h+='<button class="bigbtn mt12" data-act="loanadd">+ Add loan</button>';
  return h;
}

/* ================= wealth ================= */
function upsertSnap(total){
  const ymv=curYM();
  const s=S.snapshots.find(x=>x.ym===ymv);
  if(s){if(Math.round(s.total)!==Math.round(total)){s.total=total; save();}}
  else{S.snapshots.push({ym:ymv, total}); save();}
}
function wealthHTML(){
  const total=S.accounts.reduce((a,x)=>a+accPKR(x),0);
  const act=S.loans.filter(l=>!l.settled);
  const owed=act.filter(l=>l.dir==='lent').reduce((a,l)=>a+loanPKR(loanRemaining(l),l),0);
  const owe=act.filter(l=>l.dir==='owe').reduce((a,l)=>a+loanPKR(loanRemaining(l),l),0);
  const net=total+owed-owe;
  upsertSnap(net);
  const m=v=>view.unmask?fmt(v):'Rs ••••••';
  let h='<div class="hrow" style="margin-bottom:4px"><h2 style="margin:6px 0">Net worth</h2>'
    +'<button class="smallbtn" data-act="eye">'+(view.unmask?'🙈 Hide':'👁 Show')+'</button></div>'
    +'<div class="cards">'
    +'<div class="card"><div class="lbl">Accounts</div><div class="val">'+m(total)+'</div></div>'
    +'<div class="card"><div class="lbl">Loans net</div><div class="val '+(owed-owe>=0?'pos':'neg')+'">'+m(owed-owe)+'</div></div>'
    +'<div class="card"><div class="lbl">Net worth</div><div class="val pos">'+m(net)+'</div></div></div>';
  [['bank','🏦 Banks'],['wallet','📱 Wallets'],['intl','🌍 International'],['platform','💼 Platforms'],['cash','💵 Cash']].forEach(([k,label])=>{
    const as=S.accounts.filter(a=>a.kind===k);
    if(!as.length) return;
    h+='<h2>'+label+'</h2><div class="panel" style="padding:2px 14px">'+as.map(a=>{
      const b=accBalance(a);
      const bt=view.unmask?(a.cur==='USD'?fmtUSD(b)+' ≈ '+fmt(b*rate()):fmt(b)):'••••••';
      return '<div class="item" data-acct="'+a.id+'"><div class="ico">'+kindIcon(a.kind)+'</div>'
        +'<div class="mid"><div class="t1">'+esc(a.name)+'</div><div class="t2">'
        +(a.updated?'updated '+a.updated:'tap to set balance')+'</div></div>'
        +'<div class="amt">'+bt+'</div></div>';
    }).join('')+'</div>';
  });
  h+='<button class="bigbtn ghost mt12" data-act="acctadd">+ Add account</button>';
  const snaps=S.snapshots.slice(-6);
  if(snaps.length>1){
    h+='<h2>Net worth trend</h2><div class="panel">'+snaps.map(s=>
      '<div style="display:flex;justify-content:space-between;padding:7px 2px;font-size:14px">'
      +'<span style="color:var(--dim)">'+ymLabel(s.ym)+'</span><b>'+m(s.total)+'</b></div>').join('')+'</div>';
  }
  h+='<div class="preview mt12">Spending with a "Paid from" account, income with "Deposit to", and transfers all move these balances automatically. Tap an account to correct its balance any time — for example after bank profit or charges.</div>';
  return h;
}

function pinSheet(mode){

async function sha(s){
  const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode('kharcha·'+s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function spentByCat(ymv, catId){
  return monthTxns(ymv).filter(t=>(t.kind==='exp'||!t.kind)&&(t.cat||'misc')===catId)
    .reduce((a,t)=>a+pkrOf(t),0);
}
function budgetRows(ymv){
  const rows=[];
  CATS.forEach(c=>{const b=S.budgets.cats[c.id];
    if(b>0) rows.push({cat:c, budget:b, spent:spentByCat(ymv,c.id)});});
  return rows;
}
function overList(ymv){
  const out=[];
  budgetRows(ymv).forEach(r=>{if(r.spent>r.budget) out.push({name:r.cat.n, by:r.spent-r.budget});});
  if(S.budgets.total>0){
    const s=sums(ymv), tot=s.exp+s.pay;
    if(tot>S.budgets.total) out.push({name:'Total spending', by:tot-S.budgets.total});
  }
  return out;
}

const fmtK=n=>{n=Math.round(n); const a=Math.abs(n), sg=n<0?'-':'';
  if(a>=1e7) return sg+'Rs '+(a/1e7).toFixed(a>=1e8?0:1).replace(/\.0$/,'')+'cr';
  if(a>=1e5) return sg+'Rs '+(a/1e5).toFixed(a>=1e6?0:1).replace(/\.0$/,'')+'L';
  if(a>=1e3) return sg+'Rs '+Math.round(a/1e3)+'k';
  return sg+'Rs '+a;};
function lastMonths(n){
  const base=new Date(curYM()+'-01T00:00:00'), out=[];
  for(let i=n-1;i>=0;i--){const d=new Date(base.getFullYear(),base.getMonth()-i,1);
    out.push(d.getFullYear()+'-'+pad(d.getMonth()+1));}
  return out;
}
function currentNetWorth(){
  const total=S.accounts.reduce((a,x)=>a+accPKR(x),0);
  const act=S.loans.filter(l=>!l.settled);
  const owed=act.filter(l=>l.dir==='lent').reduce((a,l)=>a+loanPKR(loanRemaining(l),l),0);
  const owe=act.filter(l=>l.dir==='owe').reduce((a,l)=>a+loanPKR(loanRemaining(l),l),0);
  return total+owed-owe;
}
function inOutChart(data, sel){
  const W=340,H=210,base=104,maxBar=76,pad=10;
  const max=Math.max(1,...data.flatMap(d=>[d.inc,d.out]));
  const n=data.length, gw=(W-2*pad)/n;
  let bars='',labels='',taps='';
  data.forEach((d,i)=>{
    const cx=pad+gw*i+gw/2, bw=Math.min(24,gw*0.5);
    const ih=d.inc/max*maxBar, oh=d.out/max*maxBar;
    const on=sel===d.ym, op=on?1:.4;
    if(ih>0.5) bars+='<rect x="'+(cx-bw/2)+'" y="'+(base-2-ih)+'" width="'+bw+'" height="'+ih+'" rx="4" fill="var(--green)" opacity="'+op+'"/>';
    if(oh>0.5) bars+='<rect x="'+(cx-bw/2)+'" y="'+(base+2)+'" width="'+bw+'" height="'+oh+'" rx="4" fill="var(--red)" opacity="'+op+'"/>';
    const mn=MONTHS[+d.ym.slice(5,7)-1].slice(0,3);
    labels+='<text x="'+cx+'" y="'+(H-6)+'" text-anchor="middle" font-size="11" font-weight="700" fill="'+(on?'var(--txt)':'var(--dim)')+'">'+mn+'</text>';
    taps+='<rect x="'+(pad+gw*i)+'" y="0" width="'+gw+'" height="'+(H-16)+'" fill="transparent" data-tsel="'+d.ym+'"/>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">'
    +'<line x1="'+pad+'" y1="'+base+'" x2="'+(W-pad)+'" y2="'+base+'" stroke="var(--line)" stroke-width="1"/>'
    +bars+labels+taps+'</svg>';
}
function nwChart(points, mask){
  const W=340,H=150,pad=12,top=16,bot=H-22,n=points.length;
  const vals=points.map(p=>p.val), mn=Math.min(...vals), mx=Math.max(...vals), span=(mx-mn)||1;
  const sx=(W-2*pad)/(n-1);
  const xy=points.map((p,i)=>[pad+sx*i, bot-(p.val-mn)/span*(bot-top)]);
  const line=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area='M'+xy[0][0]+' '+bot+' '+xy.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+' L'+xy[n-1][0]+' '+bot+' Z';
  let dots='',labs='';
  xy.forEach((p,i)=>{
    dots+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="var(--accent)"/>';
    labs+='<text x="'+p[0].toFixed(1)+'" y="'+(H-6)+'" text-anchor="middle" font-size="10" font-weight="700" fill="var(--dim)">'+MONTHS[+points[i].ym.slice(5,7)-1].slice(0,3)+'</text>';
  });
  const end=mask?'':'<text x="'+xy[n-1][0].toFixed(1)+'" y="'+Math.max(11,xy[n-1][1]-7).toFixed(1)+'" text-anchor="end" font-size="11" font-weight="800" fill="var(--txt)">'+fmtK(points[n-1].val)+'</text>';
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">'
    +'<path d="'+area+'" fill="var(--accent)" opacity="0.12"/>'
    +'<path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
    +dots+labs+end+'</svg>';
}

    if(!from||!to){alert('Pick both accounts'); return;}
    if(from===to){alert('From and To must be different accounts'); return;}
    if(!(recv>0)){alert('Enter the received amount'); return;}
    S.txns.push({id:uid(), kind:'xfer', date, note, from, to, amtOut:amt, amtIn:recv});
    save(); render(); return;
  }
  const t={id:uid(), kind:view.kind, date, note, amt, cur:view.cur};
  if(view.cur==='USD') t.rate=rate();
  if(view.kind==='exp'){
    t.cat=view.cat;
    const s=document.getElementById('qsrc');
    if(s&&s.value){t.srcId=s.value; S.settings.lastSrc=s.value;}
  }
  if(view.kind==='inc'){
    t.cur='USD';
    t.rate=parseFloat(document.getElementById('qrate').value)||rate();
    const tx=parseFloat(document.getElementById('qtax').value);
    t.taxPct=isNaN(tx)?S.settings.taxPct:tx;
    const dd=document.getElementById('qdst');
    if(dd&&dd.value){t.dstId=dd.value; S.settings.lastDst=dd.value;}
  }
  if(view.kind==='pay'){
    if(!view.empId){alert('Pick an employee (or add one in Team tab)'); return;}
    t.empId=view.empId;
    const s=document.getElementById('qsrc');
    if(s&&s.value){t.srcId=s.value; S.settings.lastSrc=s.value;}
  }
  S.txns.push(t); save(); render();
  if(t.kind==='exp') budgetToast(t);
}

function syncXfer(){
  const fEl=document.getElementById('qfrom'); if(!fEl) return;
  const f=accById(fEl.value), t=accById(document.getElementById('qto').value);
  document.getElementById('qfromcur').textContent=f?f.cur:'—';
  document.getElementById('qtocur').textContent=t?t.cur:'—';
  view.xfrom=f?f.id:''; view.xto=t?t.id:'';
  const amt=parseFloat(document.getElementById('qamt').value)||0;
  if(f&&t&&amt>0){
    let v=amt;
    if(f.cur==='USD'&&t.cur==='PKR') v=amt*rate();
    else if(f.cur==='PKR'&&t.cur==='USD') v=amt/rate();
    document.getElementById('qrecv').value=Math.round(v*100)/100;
  }
}

function markRecPaid(id){
  const r=S.recurring.find(r=>r.id===id); if(!r) return;
  if(!(r.amount>0)){editRecSheet(r); return;}
  const t={id:uid(), kind:'exp', date:todayStr(), note:r.name, amt:r.amount, cur:r.cur, cat:r.cat, recId:r.id};
  if(r.cur==='USD') t.rate=rate();
  S.txns.push(t); save(); render();
}

function doExport(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kharcha-backup-'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
}

function updateIncPreview(){
  const el=document.getElementById('incprev'); if(!el) return;
  const amt=parseFloat(document.getElementById('qamt').value)||0;
  const qr=document.getElementById('qrate'), qt=document.getElementById('qtax');
  const r=(qr&&parseFloat(qr.value))||rate();
  const tp=qt?(parseFloat(qt.value)||0):S.settings.taxPct;
  const g=amt*r, tx=g*tp/100;
  el.innerHTML='Gross: <b>'+fmt(g)+'</b> &nbsp;·&nbsp; Tax ('+tp+'%): <b>'+fmt(tx)+'</b> &nbsp;·&nbsp; Net: <b>'+fmt(g-tx)+'</b>';
}

/* ================= events ================= */
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button[data-tab]'); if(!b) return;
  view.tab=b.dataset.tab; render();
});

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act],[data-kind],[data-cat],[data-emp],[data-recpay],[data-edit],[data-recedit],[data-payemp],[data-delemp],[data-loan],[data-acct],[data-tsel]');
  if(!el) return;
  const d=el.dataset;
  if(d.kind){view.kind=d.kind; render(); return;}
  if(d.cat){view.cat=d.cat; render(); return;}
  if(d.emp){view.empId=d.emp; render(); return;}
  if(d.recpay){e.stopPropagation(); markRecPaid(d.recpay); return;}
  if(d.loan){const l=S.loans.find(x=>x.id===d.loan); if(l) loanDetailSheet(l); return;}
  if(d.acct){const a=accById(d.acct); if(a) acctSheet(a); return;}
  if(d.tsel){view.trendSel=d.tsel; render(); return;}
  if(d.edit){const t=S.txns.find(t=>t.id===d.edit); if(t) editTxnSheet(t); return;}
  if(d.recedit){const r=S.recurring.find(r=>r.id===d.recedit); if(r) editRecSheet(r); return;}
  if(d.payemp){const emp=S.employees.find(x=>x.id===d.payemp); if(emp) payEmpSheet(emp); return;}
  if(d.delemp){
    const emp=S.employees.find(x=>x.id===d.delemp);
    if(emp&&confirm('Remove '+emp.name+'? Past payments stay in history.')){
      S.employees=S.employees.filter(x=>x.id!==d.delemp); save(); render();
    } return;
  }
  switch(d.act){
    case 'mprev': shiftMonth(-1); break;
    case 'mnext': shiftMonth(1); break;
    case 'raterefresh': refreshRate(true); break;
    case 'curflip': view.cur=view.cur==='PKR'?'USD':'PKR'; render(); break;
    case 'qsave': quickSave(); break;
    case 'hidehint': S.settings.hideHint=true; save(); render(); break;
    case 'recadd': editRecSheet({name:'',amount:0,cur:'PKR',cat:'subs',period:'monthly'}); break;
    case 'empadd': addEmpSheet(); break;
    case 'export': doExport(); break;
    case 'import': document.getElementById('impfile').click(); break;
    case 'wipe':
      if(confirm('Erase ALL data? This cannot be undone.')&&confirm('Really sure? Export a backup first if in doubt.')){
        S=seed(); save(); render();
      } break;
    case 'esave':{
      const t=S.txns.find(t=>t.id===d.id); if(!t) break;
      t.amt=parseFloat(document.getElementById('eamt').value)||t.amt;
      t.cur=document.getElementById('ecur').value;
      t.date=document.getElementById('edate').value||t.date;
      t.note=document.getElementById('enote').value.trim();
      const er=document.getElementById('erate'); if(er) t.rate=parseFloat(er.value)||t.rate;
      if(t.cur==='USD'&&!t.rate) t.rate=rate();
      const ec=document.getElementById('ecat'); if(ec) t.cat=ec.value;
      const ee=document.getElementById('eemp'); if(ee) t.empId=ee.value;
      const es=document.getElementById('esrc'); if(es) t.srcId=es.value||undefined;
      const ed2=document.getElementById('edst'); if(ed2) t.dstId=ed2.value||undefined;
      const et=document.getElementById('etax'); if(et&&!isNaN(parseFloat(et.value))) t.taxPct=parseFloat(et.value);
      save(); closeSheet(); render(); break;
    }
    case 'esavex':{
      const t=S.txns.find(t=>t.id===d.id); if(!t) break;
      t.amtOut=parseFloat(document.getElementById('examtout').value)||t.amtOut;
      t.amtIn=parseFloat(document.getElementById('examtin').value)||t.amtIn;
      t.date=document.getElementById('edate').value||t.date;
      t.note=document.getElementById('enote').value.trim();
      save(); closeSheet(); render(); break;
    }
    case 'edel':
      if(confirm('Delete this entry?')){S.txns=S.txns.filter(t=>t.id!==d.id); save(); closeSheet(); render();}
      break;
    case 'rsave':{
      const name=document.getElementById('rname').value.trim();
      if(!name){alert('Give it a name'); break;}
      const obj={
        name, amount:parseFloat(document.getElementById('ramt').value)||0,
        cur:document.getElementById('rcur').value, cat:document.getElementById('rcat').value,
        period:document.getElementById('rper').value, month:+document.getElementById('rmonth').value
      };
      if(d.id){Object.assign(S.recurring.find(r=>r.id===d.id),obj);}
      else{obj.id=uid(); S.recurring.push(obj);}
      save(); closeSheet(); render(); break;
    }
    case 'rdel':
      if(confirm('Delete this recurring item? Past payments stay in history.')){
        S.recurring=S.recurring.filter(r=>r.id!==d.id); save(); closeSheet(); render();
      } break;
    case 'psave':{
      const amt=parseFloat(document.getElementById('pamt').value);
      if(!(amt>0)){alert('Enter an amount'); break;}
      const t={id:uid(), kind:'pay', empId:d.id, amt,
        cur:document.getElementById('pcur').value,
        date:document.getElementById('pdate').value||todayStr(),
        note:document.getElementById('pnote').value.trim()};
      if(t.cur==='USD') t.rate=rate();
      S.txns.push(t); save(); closeSheet(); render(); break;
    }
    case 'eye': view.unmask=!view.unmask; render(); break;
    case 'budgetedit': budgetSheet(); break;
    case 'budgetsave':{
      const tot=parseFloat(document.getElementById('btot').value);
      S.budgets.total=(tot>0)?tot:0;
      S.budgets.cats={};
      document.querySelectorAll('[data-bcat]').forEach(i=>{
        const v=parseFloat(i.value);
        if(v>0) S.budgets.cats[i.dataset.bcat]=v;
      });
      view.tab='home'; save(); closeSheet(); render();
      toast('Budget saved ✓');
      break;
    }
    case 'acctadd': acctSheet({cur:'PKR', kind:'bank'}); break;
    case 'asave':{
      const name=document.getElementById('aname').value.trim();
      if(!name){alert('Give the account a name'); break;}
      const cur=document.getElementById('acur').value, kind=document.getElementById('akind').value;
      const balv=parseFloat(document.getElementById('abal').value);
      if(d.id){
        const a=accById(d.id); if(!a) break;
        a.name=name; a.kind=kind; a.cur=cur;
        if(!isNaN(balv)){a.base+=balv-accBalance(a); a.updated=todayStr();}
      }else{
        const a={id:uid(), name, cur, kind, base:0, updated:''};
        if(!isNaN(balv)){a.base=balv; a.updated=todayStr();}
        S.accounts.push(a);
      }
      view.tab='wealth'; save(); closeSheet(); render(); break;
    }
    case 'adel':
      if(confirm('Delete this account? Its balance disappears from net worth; past entries stay in history.')){
        S.accounts=S.accounts.filter(a=>a.id!==d.id); save(); closeSheet(); render();
      } break;
    case 'pinset': pinSheet('set'); break;
    case 'pinchange': pinSheet('change'); break;
    case 'pinoff': pinSheet('off'); break;
    case 'pindo':{
      (async()=>{
        if(d.mode!=='set'){
          const cur=document.getElementById('pcur').value;
          if(await sha(cur)!==S.settings.pinHash){alert('Current PIN is wrong'); return;}
        }
        if(d.mode==='off'){delete S.settings.pinHash; save(); closeSheet(); render(); return;}
        const p1=document.getElementById('pnew').value, p2=document.getElementById('pnew2').value;
        if(!/^\d{4}$/.test(p1)){alert('PIN must be exactly 4 digits'); return;}
        if(p1!==p2){alert('The two PINs do not match'); return;}
        S.settings.pinHash=await sha(p1); save(); closeSheet(); render();
      })();
      break;
    }
    case 'loanadd': loanEditSheet({dir:'owe',cur:'PKR'}); break;
    case 'loaneditopen':{const l=S.loans.find(x=>x.id===d.id); if(l) loanEditSheet(l); break;}
    case 'lsave':{
      const person=document.getElementById('lperson').value.trim();
      const amt=parseFloat(document.getElementById('lamt').value);
      if(!person){alert('Enter the lender / borrower name'); break;}
      if(!(amt>0)){alert('Enter the loan amount'); break;}
      const obj={dir:document.getElementById('ldir').value, person, amt,
        cur:document.getElementById('lcur').value,
        start:document.getElementById('lstart').value||todayStr(),
        due:document.getElementById('ldue').value||'',
        note:document.getElementById('lnote').value.trim()};
      if(d.id){Object.assign(S.loans.find(x=>x.id===d.id),obj);}
      else{obj.id=uid(); obj.payments=[]; obj.settled=false; S.loans.push(obj);}
      view.tab='loan'; save(); closeSheet(); render(); break;
    }
    case 'lpayadd':{
      const l=S.loans.find(x=>x.id===d.id); if(!l) break;
      const amt=parseFloat(document.getElementById('lpamt').value);
      if(!(amt>0)){alert('Enter a payment amount'); break;}
      l.payments=l.payments||[];
      l.payments.push({id:uid(), amt, date:document.getElementById('lpdate').value||todayStr()});
      if(loanRemaining(l)<=0) l.settled=true;
      save(); render(); loanDetailSheet(l); break;
    }
    case 'lpaydel':{
      const l=S.loans.find(x=>x.id===d.id); if(!l) break;
      l.payments=(l.payments||[]).filter(p=>p.id!==d.pid);
      if(loanRemaining(l)>0) l.settled=false;
      save(); render(); loanDetailSheet(l); break;
    }
    case 'lsettle':{
      const l=S.loans.find(x=>x.id===d.id); if(!l) break;
      l.settled=!l.settled; save(); render(); loanDetailSheet(l); break;
    }
    case 'ldel':
      if(confirm('Delete this loan and its payment history?')){
        S.loans=S.loans.filter(x=>x.id!==d.id); save(); closeSheet(); render();
      } break;
    case 'empsave':{
      const name=document.getElementById('ename').value.trim();
      if(!name){alert('Enter a name'); break;}
      S.employees.push({id:uid(), name}); save(); closeSheet(); render(); break;
    }
  }
});

document.addEventListener('input',e=>{
  if(e.target.id==='qamt'){updateIncPreview(); if(view.kind==='xfer') syncXfer();}
  if(e.target.id==='qrate') updateIncPreview();
  if(e.target.id==='taxpreset'||e.target.id==='taxpct'){
    const p=document.getElementById('taxpreset').value;
    S.settings.taxPreset=p;
    if(p==='pseb') S.settings.taxPct=0.25;
    else if(p==='nonpseb') S.settings.taxPct=1;
    else S.settings.taxPct=parseFloat(document.getElementById('taxpct').value)||S.settings.taxPct;
    save();
    if(e.target.id==='taxpreset') render();
  }
  if(e.target.id==='manrate'){
    const v=parseFloat(e.target.value);
    S.settings.manualRate=(v>0)?v:null; save();
    document.getElementById('ratechip').innerHTML='$1 = <b>Rs '+(Math.round(rate()*100)/100)+'</b> '+(S.settings.manualRate?'✎':'⟳');
  }
});
document.addEventListener('change',e=>{
  if(e.target.id==='qfrom'||e.target.id==='qto') syncXfer();
  // PK tax is charged when $ reaches a Pakistani bank — not while it sits in PayPal/Fiverr.
  if(e.target.id==='qdst'){
    const a=accById(e.target.value), qt=document.getElementById('qtax');
    if(qt){qt.value=(a&&a.kind!=='bank')?0:S.settings.taxPct; updateIncPreview();}
  }
  if(e.target.id==='impfile'){
    const f=e.target.files[0]; if(!f) return;
    const fr=new FileReader();
    fr.onload=()=>{
      try{
        const j=JSON.parse(fr.result);
        if(!j||!Array.isArray(j.txns)) throw 0;
        S=j; save(); render(); alert('Backup restored ✓ ('+j.txns.length+' entries)');
      }catch(_){alert('That file is not a valid Kharcha backup.');}
    };
    fr.readAsText(f); e.target.value='';
  }
});

/* ================= boot ================= */
document.getElementById('pin').addEventListener('input', async e=>{
  const v=e.target.value;
  if(v.length===4){
    if(await sha(v)===S.settings.pinHash){
      document.getElementById('lock').style.display='none'; e.target.value='';
    }else{
      document.getElementById('pinerr').textContent='Wrong PIN — try again'; e.target.value='';
    }
  }else document.getElementById('pinerr').textContent='';
});
if(S.settings.pinHash){
  const l=document.getElementById('lock');
  l.style.display='flex';
  setTimeout(()=>document.getElementById('pin').focus(),100);
}
render();
refreshRate(false);
// Register the offline engine on HTTPS or localhost (both are "secure contexts").
if('serviceWorker' in navigator && (location.protocol==='https:' || location.hostname==='localhost')){
  navigator.serviceWorker.register('sw.js')
    .then(()=>{window.__offlineReady=true;})
    .catch(()=>{});
}
window.addEventListener('online', ()=>{const b=document.getElementById('netbadge'); if(b) render();});
window.addEventListener('offline', ()=>{const b=document.getElementById('netbadge'); if(b) render();});
</script>
